authMethod: internal

authInternalUsers:
  - user: publisher
    pass: CHANGE_ME_LOCALLY
    permissions:
      - action: publish
        path: ~^camera[1-3]$
  - user: sentialx
    pass: CHANGE_ME_LOCALLY
    permissions:
      - action: read
        path: ~^camera[1-3]$

rtsp: true
rtspAddress: :8554
rtspTransports: [tcp]

paths:
  camera1: {}
  camera2: {}
  camera3: {}
