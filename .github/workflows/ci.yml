name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            cloud_two_service/rag-service/requirements.txt
            cloud_two_service/report-service/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cloud_two_service/rag-service/requirements.txt
          pip install -r cloud_two_service/report-service/requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q cloud_two_service
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

