###############################################
# SentialX - MediaMTX Yapilandirma Dosyasi
#
# Bu dosya parola icerir. GitHub'a yuklemeyin.
# Yalnizca [DEGISTIR] isaretli alanlari duzenleyin.
###############################################


###############################################
# GENEL AYARLAR
###############################################

logLevel: info
logDestinations: [stdout]
logFile: mediamtx.log
logStructured: false
dumpPackets: false

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1452
udpReadBufferSize: 0

runOnConnect:
runOnConnectRestart: false
runOnDisconnect:


###############################################
# KIMLIK DOGRULAMA
###############################################

authMethod: internal

authInternalUsers:
  # FFmpeg bu hesapla kamera1 yoluna yayin yapar.
  - user: yayinci
    pass: YAYINCI_SIFRENI_BURAYA_YAZ # [DEGISTIR]
    ips: []
    permissions:
      - action: publish
        path: kamera1

  # Edge Agent bu hesapla kamera1 yayinini okur.
  - user: sentialx
    pass: EDGE_SIFRENI_BURAYA_YAZ # [DEGISTIR]
    ips: []
    permissions:
      - action: read
        path: kamera1

  # Yalnizca yerel makineden yonetim erisimi.
  - user: any
    pass:
    ips: ['127.0.0.1', '::1']
    permissions:
      - action: api
      - action: metrics
      - action: pprof

authHTTPAddress:
authHTTPFingerprint:
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof
authJWTJWKS:
authJWTJWKSFingerprint:
authJWTClaimKey: mediamtx_permissions
authJWTExclude: []
authJWTIssuer:
authJWTAudience:


###############################################
# KONTROL API'SI
###############################################

api: false
apiAddress: :9997
apiEncryption: false
apiServerKey: server.key
apiServerCert: server.crt
apiAllowOrigins: ['*']
apiTrustedProxies: []

metrics: false
metricsAddress: :9998
metricsEncryption: false
metricsServerKey: server.key
metricsServerCert: server.crt
metricsAllowOrigins: ['*']
metricsTrustedProxies: []

pprof: false
pprofAddress: :9999
pprofEncryption: false
pprofServerKey: server.key
pprofServerCert: server.crt
pprofAllowOrigins: ['*']
pprofTrustedProxies: []

playback: false
playbackAddress: :9996
playbackEncryption: false
playbackServerKey: server.key
playbackServerCert: server.crt
playbackAllowOrigins: ['*']
playbackTrustedProxies: []


###############################################
# RTSP SUNUCUSU
###############################################

rtsp: true
rtspTransports: [udp, multicast, tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]


###############################################
# DIGER PROTOKOLLER
# SentialX yalnizca RTSP kullandigi icin kapalidir.
###############################################

rtmp: false
rtmpEncryption: "no"
rtmpAddress: :1935
rtmpsAddress: :1936
rtmpServerKey: server.key
rtmpServerCert: server.crt

hls: false
hlsAddress: :8888
hlsEncryption: false
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAllowOrigins: ['*']
hlsTrustedProxies: []
hlsAlwaysRemux: false
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsDirectory: ''
hlsMuxerCloseAfter: 60s

webrtc: false
webrtcAddress: :8889
webrtcEncryption: false
webrtcServerKey: server.key
webrtcServerCert: server.crt
webrtcAllowOrigins: ['*']
webrtcTrustedProxies: []
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: ''
webrtcIPsFromInterfaces: true
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: []
webrtcICEServers2: []
webrtcSTUNGatherTimeout: 5s
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s

srt: false
srtAddress: :8890


###############################################
# VARSAYILAN PATH AYARLARI
###############################################

pathDefaults:
  source: publisher
  sourceFingerprint:
  sourceOnDemand: false
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s
  maxReaders: 0
  srtReadPassphrase:
  useAbsoluteTimestamp: false

  alwaysAvailable: false
  alwaysAvailableTracks: []
  alwaysAvailableFile: ''

  # Yerel kayit kapali. Edge Agent gerekli kareleri isleyecek.
  record: false
  recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordMaxPartSize: 50M
  recordSegmentDuration: 1h
  recordDeleteAfter: 1d

  # Ayni kamera yoluna ikinci bir yayincinin baglanmasini engeller.
  overridePublisher: false
  srtPublishPassphrase:
  rtspDemuxMpegts: false

  rtspTransport: automatic
  rtspAnyPort: false
  rtspRangeType:
  rtspRangeStart:
  rtspUDPSourcePortRange: [10000, 65535]

  rtpSDP:

  whepBearerToken: ''
  whepSTUNGatherTimeout: 5s
  whepHandshakeTimeout: 10s
  whepTrackGatherTimeout: 2s

  sourceRedirect:

  runOnInit:
  runOnInitRestart: false
  runOnDemand:
  runOnDemandRestart: false
  runOnDemandStartTimeout: 10s
  runOnDemandCloseAfter: 10s
  runOnUnDemand:
  runOnReady:
  runOnReadyRestart: false
  runOnNotReady:
  runOnRead:
  runOnReadRestart: false
  runOnUnread:
  runOnRecordSegmentCreate:
  runOnRecordSegmentComplete:


###############################################
# KAMERA TANIMLARI
###############################################

paths:
  kamera1:
